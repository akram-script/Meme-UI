<div style="display:flex; height:100vh; background:#0f172a;">

  <aside style="width:220px; background:#1e293b; display:flex; flex-direction:column;
                padding:24px 16px; gap:8px; border-right:1px solid #334155; flex-shrink:0;">
    <div style="padding:0 8px; margin-bottom:24px;">
      <div style="font-size:22px; font-weight:700; color:#f8fafc;">🎭 MemeGen</div>
      <div style="font-size:12px; color:#64748b; margin-top:4px;">Créez vos mèmes</div>
    </div>

    <a routerLink="/" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="active-link"
       style="display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px;
              text-decoration:none; color:#94a3b8; font-weight:500; transition:all 0.2s;">
      ✏️ <span>Éditeur</span>
    </a>

    <a routerLink="/gallery" routerLinkActive="active-link"
       style="display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px;
              text-decoration:none; color:#94a3b8; font-weight:500; transition:all 0.2s;">
      🖼️ <span>Galerie</span>
    </a>
  </aside>

  <main style="flex:1; overflow-y:auto; background:#0f172a;">
    <router-outlet></router-outlet>
  </main>

</div>
