<div style="padding:32px; max-width:720px; margin:0 auto;">

  <!-- Notification -->
  <div 
    *ngIf="showNotification" 
    style="position: fixed; top: 24px; right: 24px; padding: 16px 24px; 
           background: {{ notificationMessage.includes('Error') ? '#ef4444' : '#22c55e' }}; 
           color: white; border-radius: 12px; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
           font-weight: 600; z-index: 1000; display: flex; align-items: center; gap: 12px;
           animation: slideIn 300ms ease-out forwards;">
    <span style="font-size: 20px;">{{ notificationMessage.includes('Error') ? '❌' : '✅' }}</span>
    <span>{{ notificationMessage }}</span>
  </div>

  <style>
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>

  <h2 style="font-size:24px; font-weight:700; color:#f8fafc; margin-bottom:24px;">✏️ Éditeur</h2>

  <div style="background:#1e293b; border-radius:20px; padding:32px; border:1px solid #334155;">

    <label style="display:flex; flex-direction:column; align-items:center; justify-content:center;
                  height:120px; border:2px dashed #334155; border-radius:16px; cursor:pointer;
                  background:#0f172a; transition:all 0.2s; margin-bottom:24px;"
           onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='#334155'">
      <span style="font-size:32px;">📁</span>
      <span style="color:#64748b; font-size:14px; margin-top:8px;">Cliquer pour choisir une image</span>
      <input type="file" style="display:none;" (change)="upload($event)" accept="image/*"/>
    </label>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;">
      <div>
        <label style="display:block; font-size:13px; color:#64748b; margin-bottom:6px; font-weight:500;">Texte du haut</label>
        <input type="text" placeholder="TOP TEXT"
          [(ngModel)]="topText" (input)="draw()"
          style="width:100%; padding:12px 16px; background:#0f172a; border:1px solid #334155;
                 border-radius:12px; color:#f1f5f9; font-size:14px; outline:none; transition:all 0.2s;"
          onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#334155'"/>
      </div>
      <div>
        <label style="display:block; font-size:13px; color:#64748b; margin-bottom:6px; font-weight:500;">Texte du bas</label>
        <input type="text" placeholder="BOTTOM TEXT"
          [(ngModel)]="bottomText" (input)="draw()"
          style="width:100%; padding:12px 16px; background:#0f172a; border:1px solid #334155;
                 border-radius:12px; color:#f1f5f9; font-size:14px; outline:none; transition:all 0.2s;"
          onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#334155'"/>
      </div>
    </div>

    <div style="background:#0f172a; border-radius:16px; padding:8px; margin-bottom:24px;
                border:1px solid #334155; min-height:200px; display:flex; align-items:center; justify-content:center;">
      <canvas #canvas style="max-width:100%; border-radius:12px;"></canvas>
    </div>

    <div style="display:flex; gap:12px;">
      <button (click)="download()" [disabled]="loading"
        style="flex:1; padding:14px; background:#3b82f6; color:white; border:none;
               border-radius:14px; font-size:15px; font-weight:600;">
        {{ loading ? '⏳ ...' : '⬇️ Download' }}
      </button>
      <button (click)="save()" [disabled]="loading"
        style="flex:1; padding:14px; background:#22c55e; color:white; border:none;
               border-radius:14px; font-size:15px; font-weight:600;">
        {{ loading ? '⏳ Saving...' : '💾 Save' }}
      </button>
    </div>

  </div>
</div>
