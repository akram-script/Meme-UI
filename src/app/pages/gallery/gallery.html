<div style="padding:32px; max-width:1100px; margin:0 auto;">

  <h2 style="font-size:24px; font-weight:700; color:#f8fafc; margin-bottom:24px;">🖼️ Galerie</h2>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <div *ngIf="isLoading"
    style="display:flex; align-items:center; justify-content:center;
           background:#1e293b; border-radius:20px; padding:64px; border:1px solid #334155;">
    <span style="font-size:32px; animation:spin 1s linear infinite;">⏳</span>
    <span style="color:#64748b; margin-left:16px; font-size:16px;">Chargement...</span>
  </div>

  <div *ngIf="error"
    style="display:flex; flex-direction:column; align-items:center; justify-content:center;
           background:#1e293b; border-radius:20px; padding:32px; border:1px solid #ef4444; color:#fca5a5;">
    <span style="font-size:32px; margin-bottom:16px;">⚠️</span>
    <p style="font-size:16px; font-weight:600;">{{ error }}</p>
  </div>

  <div *ngIf="!isLoading && !error && memes.length === 0"
    style="display:flex; flex-direction:column; align-items:center; justify-content:center;
           background:#1e293b; border-radius:20px; padding:64px; border:1px solid #334155; color:#475569;">
    <span style="font-size:48px; margin-bottom:16px;">🗃️</span>
    <p style="font-size:18px; font-weight:600;">Aucun mème sauvegardé</p>
    <p style="font-size:14px; margin-top:8px;">Créez un mème dans l'éditeur !</p>
  </div>

  <div *ngIf="!isLoading && memes.length > 0"
    style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:20px;">
    @for (meme of memes; track meme.id) {
      <div style="background:#1e293b; border-radius:20px; overflow:hidden;
                  border:1px solid #334155; transition:all 0.2s; cursor: pointer;"
           (click)="viewImage(meme)"
           onmouseover="this.style.transform='translateY(-4px)'; this.style.borderColor='#3b82f6'"
           onmouseout="this.style.transform='none'; this.style.borderColor='#334155'">
        <img [src]="meme.imageUrl" style="width:100%; height:200px; object-fit:cover;"/>
        <div style="padding:16px;">
          <p style="font-size:12px; color:#475569; margin-bottom:12px;">
            {{ meme.createdAt | date:'dd/MM/yyyy HH:mm' }}
          </p>
          <div style="display:flex; gap:10px;">
            <button type="button" (click)="$event.stopPropagation(); share(meme)"
              style="flex:1; padding:10px; background:#2563eb; color:white;
                     border:1px solid #2563eb; border-radius:10px; font-weight:600;
                     font-size:14px; transition:all 0.2s;"
              onmouseover="this.style.background='#1d4ed8'"
              onmouseout="this.style.background='#2563eb'">
              🔗 Partager
            </button>
            <button type="button" (click)="$event.stopPropagation(); delete(meme.id)" [disabled]="deletingId === meme.id"
              style="flex:1; padding:10px; background:transparent; color:#ef4444;
                     border:1px solid #ef4444; border-radius:10px; font-weight:600;
                     font-size:14px; transition:all 0.2s;"
              onmouseover="if(!this.disabled){ this.style.background='#ef4444'; this.style.color='white'; }"
              onmouseout="this.style.background='transparent'; this.style.color='#ef4444';">
              {{ deletingId === meme.id ? '⏳ Suppression...' : '🗑️ Supprimer' }}
            </button>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Modal for viewing large image -->
  <div *ngIf="selectedMeme" 
    style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
           background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; 
           justify-content: center; z-index: 2000; animation: fadeIn 200ms ease-out forwards;">
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
    <div style="position: relative; max-width: 90vw; max-height: 90vh; display: flex; flex-direction: column; align-items: center;">
      <!-- Close button -->
      <button (click)="closeModal()"
        style="position: absolute; top: -50px; right: 0; background: #ef4444; color: white; 
               border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; 
               cursor: pointer; font-weight: bold; transition: all 0.2s;"
        onmouseover="this.style.background='#dc2626'"
        onmouseout="this.style.background='#ef4444'">
        ✕
      </button>
      
      <!-- Image -->
      <img [src]="selectedMeme.imageUrl" 
        style="max-width: 100%; max-height: 85vh; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);"/>
      
      <!-- Info -->
      <div style="margin-top: 20px; text-align: center; color: #f1f5f9;">
        <p style="font-size: 14px; color: #64748b;">
          {{ selectedMeme.createdAt | date:'dd/MM/yyyy HH:mm' }}
        </p>
      </div>
    </div>
  </div>

</div>
